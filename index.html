<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RidhFinance</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
.header {padding:16px; font-size:20px; font-weight:bold;}
.container {padding:16px;}
.card {background:#fff;padding:16px;margin-bottom:12px;border-radius:12px;}
button {padding:8px 12px;border:none;border-radius:8px;background:#000;color:#fff;margin-right:5px;}
select {padding:8px;border-radius:8px;margin-top:8px;width:100%;}
.chips {display:flex;flex-wrap:wrap;gap:8px;}
.chip {padding:6px 10px;border:1px solid #ccc;border-radius:20px;cursor:pointer;}
.chip.active {background:#000;color:#fff;}
</style>
</head>

<body>

<div class="header">RidhFinance Dashboard</div>

<div class="container">

<div class="card">
<h3>Mode</h3>
<button onclick="setMode('personal')">Personal</button>
<button onclick="setMode('business')">Business</button>
</div>

<div class="card">
<h3>Add / Update Account</h3>
<input id="accName" placeholder="Account Name" style="width:100%;padding:8px;">
<input id="accBalance" placeholder="Balance" type="number" style="width:100%;padding:8px;margin-top:8px;">

<select id="accType">
  <option value="personal">Personal</option>
  <option value="business">Business</option>
</select>

<button onclick="saveAccount()" style="margin-top:10px;">Save Account</button>
</div>

<div class="card">
<h3>Net Worth</h3>
<canvas id="netChart"></canvas>
</div>

<div class="card">
<h3>Expenses</h3>
<canvas id="expChart"></canvas>
</div>

<div class="card">
<h3>Category Filters</h3>
<div id="chips" class="chips"></div>
</div>

<div class="card">
<h3>Insights</h3>
<div id="insight1"></div>
<div id="insight2"></div>
</div>

</div>

<script>

// Firebase Config
const FC={
apiKey:"AIzaSyD62wAObOg5Ic3eJEd9Erp3ljBojgQq7zk",
authDomain:"ridh-finance.firebaseapp.com",
projectId:"ridh-finance",
storageBucket:"ridh-finance.firebasestorage.app",
messagingSenderId:"330824386857",
appId:"1:330824386857:web:ff45c66c11ea2e8d708f38"
};

firebase.initializeApp(FC);
const db = firebase.firestore();

// State
let accounts = [];
let transactions = [];
let mode = "personal";
let selectedCategories = [];

const categories = ["Food","Rent","Transport","Shopping","Bills"];

// Load Data
function loadData(){
  db.collection("accounts").onSnapshot(snapshot=>{
    accounts = snapshot.docs.map(doc=>({
      id:doc.id,
      type:"personal",
      excludeFromNetWorth:false,
      excludeFromIncomeExpense:false,
      isDisabled:false,
      ...doc.data()
    }));
    renderAll();
  });

  db.collection("transactions").onSnapshot(snapshot=>{
    transactions = snapshot.docs.map(doc=>doc.data());
    renderAll();
  });
}

// Save Account (NEW FEATURE)
function saveAccount(){
  const name = document.getElementById("accName").value;
  const balance = Number(document.getElementById("accBalance").value);
  const type = document.getElementById("accType").value;

  if(!name) return alert("Enter account name");

  db.collection("accounts").add({
    name,
    balance,
    type,
    excludeFromNetWorth:false,
    excludeFromIncomeExpense:false,
    isDisabled:false
  });

  alert("Account saved!");
}

// Mode
function setMode(m){
  mode = m;
  renderAll();
}

// Filter Accounts
function getAccounts(){
  return accounts.filter(a=>{
    if(mode==="business") return a.type==="business";
    return a.type!=="business";
  });
}

// Render All
function renderAll(){
  renderNetWorth();
  renderExpenses();
  renderInsights();
}

// Net Worth
function renderNetWorth(){
  const acc = getAccounts();

  const total = acc
    .filter(a=>!a.excludeFromNetWorth && !a.isDisabled)
    .reduce((sum,a)=>sum+(a.balance||0),0);

  new Chart(document.getElementById("netChart"), {
    type:'line',
    data:{
      labels:["Now"],
      datasets:[{label:"Net Worth", data:[total]}]
    }
  });
}

// Expenses
function renderExpenses(){
  let data = {};

  transactions.forEach(t=>{
    if(selectedCategories.length && !selectedCategories.includes(t.category)) return;
    data[t.category]=(data[t.category]||0)+t.amount;
  });

  new Chart(document.getElementById("expChart"), {
    type:'bar',
    data:{
      labels:Object.keys(data),
      datasets:[{label:"Expenses", data:Object.values(data)}]
    }
  });
}

// Category Chips
function renderChips(){
  const container = document.getElementById("chips");

  categories.forEach(cat=>{
    const chip = document.createElement("div");
    chip.className="chip";
    chip.innerText=cat;

    chip.onclick=()=>{
      chip.classList.toggle("active");

      if(selectedCategories.includes(cat)){
        selectedCategories = selectedCategories.filter(c=>c!==cat);
      } else {
        selectedCategories.push(cat);
      }

      renderExpenses();
    };

    container.appendChild(chip);
  });
}

// Insights
function renderInsights(){
  if(!transactions.length) return;

  const total = transactions.reduce((s,t)=>s+t.amount,0);
  const avg = total / transactions.length;

  document.getElementById("insight1").innerText =
    "Average Transaction: $" + avg.toFixed(2);

  let map = {};
  transactions.forEach(t=>{
    map[t.category]=(map[t.category]||0)+t.amount;
  });

  const top = Object.keys(map).sort((a,b)=>map[b]-map[a])[0];

  document.getElementById("insight2").innerText =
    "Top Spending Category: " + top;
}

// Init
renderChips();
loadData();

</script>

</body>
</html>
